name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署，跳过排队中的旧运行；不取消进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BUILD_TARGET: export
      NEXT_PUBLIC_SITE_URL: https://www.zgc-llm.org.cn
      # 统一合作/加入申请（/join 与网安组 join CTA 共用）的外部表单地址：在仓库 Settings → Secrets and variables → Actions
      # 中配置 Variable `NEXT_PUBLIC_APPLICATION_URL`（飞书问卷 https:// 链接，需外部/匿名可填）。
      # 未配置时 CTA 会回退为「申请通道准备中」的禁用态。
      NEXT_PUBLIC_APPLICATION_URL: ${{ vars.NEXT_PUBLIC_APPLICATION_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.2.2
      - uses: actions/setup-node@v7
        with:
          cache: pnpm
          node-version: 22
      - uses: actions/configure-pages@v6
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
