name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly release-lane rehearsal. T-010 owns the Playwright project matrix.
    - cron: '30 18 * * 0'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  NODE_VERSION: 22.23.1
  PNPM_VERSION: 11.2.2
  NEXT_PUBLIC_SITE_URL: https://www.zgc-llm.org.cn
  NEXT_PUBLIC_APPLICATION_URL: ${{ vars.NEXT_PUBLIC_APPLICATION_URL }}
  NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY: ${{ vars.NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY }}
  NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY_PROGRAM: ${{ vars.NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY_PROGRAM }}

jobs:
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate frozen production dependency graph
        run: pnpm install --prod --frozen-lockfile --ignore-scripts
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high --registry https://registry.npmjs.org

  quality:
    # Core checks remain independent from both production build targets.
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check types
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Run unit tests with required coverage
        # T-009 owns Vitest's numeric thresholds. This required step propagates
        # every test or threshold failure and must never use continue-on-error.
        run: pnpm test:coverage
      - name: Upload coverage diagnostics
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Production builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build standalone production target
        run: pnpm build
      - name: Build GitHub Pages export target
        run: pnpm build:export

  required-quality:
    # Keep this name stable: main branch protection requires it. The aggregate
    # runs even when a dependency fails or is skipped, so build/export failures
    # can never leave the required context green or silently skipped.
    name: Types, lint & unit tests
    if: ${{ always() }}
    needs:
      - quality
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Enforce required quality and production build results
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: |
          echo "Quality checks: ${QUALITY_RESULT}"
          echo "Production builds: ${BUILD_RESULT}"
          if [ "${QUALITY_RESULT}" != 'success' ] || [ "${BUILD_RESULT}" != 'success' ]; then
            echo '::error::Required quality gate needs both Quality checks and Production builds to succeed.'
            exit 1
          fi

  e2e:
    # Keep this name stable: main branch protection requires it.
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: playwright
        run: |
          version="$(node -p 'require("@playwright/test/package.json").version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Chromium
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright.outputs.version }}-chromium
      - name: Install Chromium and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Run required Chromium E2E suite
        run: pnpm test:e2e:chromium
      - name: Upload Playwright diagnostics
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-chromium
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  release-e2e:
    # Scheduled and manual release rehearsals execute every Playwright project,
    # including cross-browser, mobile, accessibility and Lighthouse gates.
    name: Release E2E contract
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: playwright
        run: |
          version="$(node -p 'require("@playwright/test/package.json").version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache release browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright.outputs.version }}-release
      - name: Install release browsers and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Install release browser system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium firefox webkit
      - name: Run configured release E2E projects
        run: pnpm test:e2e
      - name: Upload release Playwright diagnostics
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-release
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
