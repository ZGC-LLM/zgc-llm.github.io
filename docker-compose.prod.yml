# 生产部署（standalone 容器）。用法：
#   构建（把公开变量在构建期注入，见下方 args）：
#     docker compose -f docker-compose.prod.yml build
#   启动：
#     docker compose -f docker-compose.prod.yml up -d
#
# 注意：NEXT_PUBLIC_* 是构建期变量，会被烘焙进产物，必须在 build args 传入，
# 运行期再改这些值无效。申请表单 URL 未传时，CTA 会优雅降级为「申请通道准备中」。
services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.zgc-llm.org.cn}
        NEXT_PUBLIC_INSTITUTION_APPLICATION_URL: ${NEXT_PUBLIC_INSTITUTION_APPLICATION_URL:-}
        NEXT_PUBLIC_PROFESSIONAL_APPLICATION_URL: ${NEXT_PUBLIC_PROFESSIONAL_APPLICATION_URL:-}
    image: zgcllm:latest
    ports:
      - '3000:3000'
    restart: unless-stopped
