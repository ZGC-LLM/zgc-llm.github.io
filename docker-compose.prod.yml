# Production standalone container. NEXT_PUBLIC_* values are public build-time
# inputs baked into the output; changing them requires rebuilding the image.
services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APPLICATION_URL: ${NEXT_PUBLIC_APPLICATION_URL:-}
        NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY: ${NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY:-}
        NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY_PROGRAM: ${NEXT_PUBLIC_APPLICATION_URL_CYBERSECURITY_PROGRAM:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.zgc-llm.org.cn}
    image: zgcllm:latest
    init: true
    ports:
      - '127.0.0.1:3000:3000'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 15s
